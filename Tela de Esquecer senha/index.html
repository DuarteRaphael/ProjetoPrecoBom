<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <link rel="stylesheet" href="/projeto preço bom 0001/Tela de Esquecer senha/index.css">
</head>
<body>
    <div class="container">
        <div class="forgot-card">
            <h2>Esqueceu a senha?</h2>
            <p>Não se preocupe! Digite seu e-mail abaixo e enviaremos instruções para criar uma nova.</p>
            
            <form>
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                
                <button type="submit" class="btn-reset">Enviar Link de Recuperação</button>
            </form>
            
            <div class="footer">
                <a href="#">Voltar para o Login</a>
            </div>
        </div>
    </div>
</body>
</html>
